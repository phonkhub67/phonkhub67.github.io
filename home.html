<!DOCTYPE html>
<html lang="en">

<head>
<link rel="stylesheet" href="cursor.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHONK HUB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>

:root{
  --accent:#ff00ff;
  --accent2:#8a00ff;
  --accent3:#ff3cac;
  --bg:#05010d;
  --panel:rgba(14,2,26,0.88);
  --panel2:rgba(22,8,36,0.9);
  --border:rgba(255,0,255,0.18);
  --text:#ffffff;
  --muted:#a984c4;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Orbitron',sans-serif;
}

html,body{
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

body{
  padding-bottom:200px;
  background:radial-gradient(ellipse at top,#2d0045 0%,#05010d 65%);
  min-height:100vh;
}

a{color:inherit;text-decoration:none;}

/* ===== BACKGROUND ===== */
.ghosts{
  position:fixed;
  width:100%;height:100%;
  top:0;left:0;
  overflow:hidden;
  pointer-events:none;
  z-index:0;
}

.ghost{
  position:absolute;
  width:160px;height:160px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,0,255,0.28),transparent 70%);
  filter:blur(22px);
  animation:ghostMove linear infinite;
  opacity:0;
}

.g1{top:8%;left:-200px;animation-duration:20s;}
.g2{top:35%;left:-260px;animation-duration:26s;animation-delay:4s;}
.g3{top:60%;left:-180px;animation-duration:19s;animation-delay:8s;}
.g4{top:80%;left:-220px;animation-duration:30s;animation-delay:2s;}
.g5{top:18%;left:-190px;animation-duration:23s;animation-delay:11s;}

@keyframes ghostMove{
  0%{transform:translateX(0) scale(1);opacity:0;}
  10%{opacity:0.38;}
  50%{transform:translateX(65vw) scale(1.4);}
  100%{transform:translateX(140vw) scale(1);opacity:0;}
}

.particles{
  position:fixed;
  width:100%;height:100%;
  top:0;left:0;
  pointer-events:none;
  overflow:hidden;
  z-index:0;
}

.particles span{
  position:absolute;
  display:block;
  width:5px;height:5px;
  background:#ff00ff;
  border-radius:50%;
  box-shadow:0 0 10px #ff00ff,0 0 22px #ff00ff;
  animation:particleMove linear infinite;
  opacity:0;
}

.particles span:nth-child(1){left:5%;animation-duration:8s;animation-delay:0s;}
.particles span:nth-child(2){left:18%;animation-duration:11s;animation-delay:2s;}
.particles span:nth-child(3){left:32%;animation-duration:7s;animation-delay:1s;}
.particles span:nth-child(4){left:48%;animation-duration:13s;animation-delay:3.5s;}
.particles span:nth-child(5){left:63%;animation-duration:9s;animation-delay:5s;}
.particles span:nth-child(6){left:77%;animation-duration:12s;animation-delay:4s;}
.particles span:nth-child(7){left:88%;animation-duration:10s;animation-delay:2.5s;}
.particles span:nth-child(8){left:95%;animation-duration:15s;animation-delay:1s;}

@keyframes particleMove{
  0%{transform:translateY(100vh) scale(0);opacity:0;}
  10%{opacity:0.75;}
  100%{transform:translateY(-120vh) scale(1.5);opacity:0;}
}

/* ===== TOPBAR ===== */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  padding:15px 28px;
  background:rgba(5,1,13,0.82);
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:1000;
  backdrop-filter:blur(22px);
  -webkit-backdrop-filter:blur(22px);
}

.logo{
  font-size:24px;
  font-weight:900;
  background:linear-gradient(135deg,#ff00ff,#8a00ff,#ff3cac);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:2px;
  white-space:nowrap;
  filter:drop-shadow(0 0 14px rgba(255,0,255,0.55));
}

.view-title{
  font-size:10px;
  color:var(--muted);
  letter-spacing:4px;
  text-transform:uppercase;
  opacity:.65;
}

.search-box{
  width:340px;
  max-width:44vw;
  position:relative;
}

.search-box::before{
  content:"⌕";
  position:absolute;
  left:16px;
  top:50%;
  transform:translateY(-50%);
  font-size:16px;
  z-index:1;
  opacity:0.4;
  pointer-events:none;
  font-family:sans-serif;
}

.search-box input{
  width:100%;
  padding:11px 20px 11px 42px;
  border-radius:40px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.05);
  color:white;
  outline:none;
  font-size:12px;
  font-family:'Orbitron',sans-serif;
  transition:.3s;
  backdrop-filter:blur(10px);
}

.search-box input::placeholder{color:rgba(255,255,255,0.28);}

.search-box input:focus{
  border-color:var(--accent);
  background:rgba(255,0,255,0.07);
  box-shadow:0 0 22px rgba(255,0,255,0.22);
}

/* ===== VIEW TRANSITIONS ===== */
.view{display:none;position:relative;z-index:1;}

.view.active{
  display:block;
  animation:viewIn .45s cubic-bezier(.22,1,.36,1);
}

@keyframes viewIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

/* ===== HERO ===== */
.hero{
  text-align:center;
  padding:44px 15px 16px;
}

.hero-logo-wrap{
  position:relative;
  display:inline-block;
  margin-bottom:6px;
}

.hero-logo-wrap::before{
  content:"";
  position:absolute;
  inset:-14px;
  border-radius:50%;
  background:conic-gradient(from 0deg,#ff00ff,#8a00ff,#ff3cac,transparent,#ff00ff);
  animation:spinRing 5s linear infinite;
  filter:blur(10px);
  opacity:0.65;
  z-index:0;
}

@keyframes spinRing{to{transform:rotate(360deg);}}

.hero img{
  width:150px;
  height:150px;
  object-fit:cover;
  border-radius:50%;
  border:2px solid rgba(255,0,255,0.6);
  box-shadow:0 0 40px rgba(255,0,255,0.45),0 0 80px rgba(138,0,255,0.2);
  display:block;
  position:relative;
  z-index:1;
  animation:floatY 6s ease-in-out infinite;
}

@keyframes floatY{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-12px);}
}

.hero p{
  margin-top:18px;
  color:rgba(255,255,255,0.38);
  font-size:10px;
  letter-spacing:3px;
  text-transform:uppercase;
}

/* ===== SECTION LABEL ===== */
.section-label{
  padding:24px 30px 4px;
  font-size:10px;
  letter-spacing:4px;
  text-transform:uppercase;
  color:var(--muted);
  opacity:.65;
}

/* ===== SONGS GRID ===== */
.songs{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(256px,1fr));
  gap:18px;
  padding:16px 22px 220px; /* generous bottom so player bar never hides cards */
}

/* ===== SKELETON ===== */
.skeleton-card{
  background:rgba(255,255,255,0.03);
  border-radius:22px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.05);
}

.sk-img{
  width:100%;height:234px;
  background:linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.09) 50%,rgba(255,255,255,0.04) 75%);
  background-size:200% 100%;
  animation:shimmer 1.7s infinite;
}

.sk-body{padding:16px 18px 20px;}

.sk-line{
  height:12px;border-radius:6px;
  background:linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.09) 50%,rgba(255,255,255,0.04) 75%);
  background-size:200% 100%;
  animation:shimmer 1.7s infinite;
  margin-bottom:10px;
}

.sk-line.short{width:55%;}
.sk-line.xshort{width:35%;margin-bottom:18px;}

.sk-btns{display:flex;gap:10px;}

.sk-btn{
  flex:1;height:42px;border-radius:14px;
  background:linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.09) 50%,rgba(255,255,255,0.04) 75%);
  background-size:200% 100%;
  animation:shimmer 1.7s infinite;
}

@keyframes shimmer{
  0%{background-position:200% 0;}
  100%{background-position:-200% 0;}
}

/* ===== CARD ===== */
.card{
  background:rgba(10,3,20,0.72);
  border-radius:22px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.07);
  transition:transform .4s cubic-bezier(.22,1,.36,1),box-shadow .4s,border-color .4s;
  position:relative;
  opacity:0;
  transform:translateY(24px);
  animation:cardIn .55s cubic-bezier(.22,1,.36,1) forwards;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}

@keyframes cardIn{to{opacity:1;transform:translateY(0);}}

.card:hover{
  transform:translateY(-10px) scale(1.015);
  border-color:rgba(255,0,255,0.45);
  box-shadow:0 24px 60px rgba(0,0,0,0.55),0 0 0 1px rgba(255,0,255,0.12),0 0 40px rgba(255,0,255,0.12);
}

.card.playing{
  border-color:var(--accent);
  box-shadow:0 0 0 1px rgba(255,0,255,0.35),0 0 50px rgba(255,0,255,0.25);
}

.phonk-image{
  width:100%;
  height:234px;
  overflow:hidden;
  position:relative;
}

.phonk-image img{
  width:100%;height:100%;
  object-fit:cover;
  transition:transform .65s ease;
}

.card:hover .phonk-image img{
  transform:scale(1.1);
}

.phonk-image::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom,transparent 45%,rgba(5,1,13,0.88) 100%);
  pointer-events:none;
}

.cloud-badge{
  position:absolute;
  top:12px;left:12px;
  background:rgba(255,0,255,0.18);
  border:1px solid rgba(255,0,255,0.45);
  color:#fff;
  font-size:9px;
  font-weight:700;
  letter-spacing:2px;
  padding:5px 12px;
  border-radius:20px;
  backdrop-filter:blur(10px);
  z-index:5;
}

.star-btn{
  position:absolute;
  top:12px;right:12px;
  width:38px;height:38px;
  border:1px solid rgba(255,255,255,0.12);
  border-radius:50%;
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(14px);
  color:rgba(255,255,255,0.5);
  font-size:17px;
  cursor:pointer;
  transition:.28s;
  z-index:5;
}

.star-btn:hover{
  background:rgba(255,215,0,0.18);
  border-color:rgba(255,215,0,0.5);
  transform:scale(1.15);
  color:#ffd700;
}

.star-btn.active{
  color:#ffd700;
  background:rgba(255,215,0,0.15);
  border-color:rgba(255,215,0,0.5);
  box-shadow:0 0 18px rgba(255,215,0,0.55);
}

.content{
  padding:15px 18px 18px;
}

.content h2{
  font-size:14px;
  font-weight:700;
  margin-bottom:5px;
  letter-spacing:0.5px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.artist{
  color:var(--accent);
  margin-bottom:15px;
  font-size:10px;
  letter-spacing:2px;
  text-transform:uppercase;
}

.buttons{display:flex;gap:8px;}

.play-btn{
  flex:1;
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);
  border:none;
  color:white;
  padding:13px 10px;
  border-radius:14px;
  font-weight:700;
  font-size:10px;
  letter-spacing:2px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  transition:transform .22s,box-shadow .22s,filter .22s;
  font-family:'Orbitron',sans-serif;
  position:relative;
  overflow:hidden;
  box-shadow:0 4px 18px rgba(255,0,255,0.3);
}

/* Sheen sweep on hover */
.play-btn::after{
  content:"";
  position:absolute;
  top:0;left:-100%;
  width:60%;height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.22),transparent);
  transition:left .4s ease;
}

.play-btn:hover::after{left:160%;}

.play-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 30px rgba(255,0,255,0.5);
  filter:brightness(1.1);
}

.play-btn:active{
  transform:translateY(0) scale(.96);
  box-shadow:0 3px 12px rgba(255,0,255,0.3);
}

/* Small CSS triangle — play icon */
.play-tri{
  width:0;height:0;
  border-style:solid;
  border-width:5px 0 5px 8px;
  border-color:transparent transparent transparent rgba(255,255,255,0.9);
  flex-shrink:0;
  transition:opacity .2s;
}

.play-btn.playing .play-tri{display:none;}

.download-btn{
  flex:1;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.14);
  color:rgba(255,255,255,0.85);
  padding:13px 10px;
  border-radius:14px;
  font-weight:700;
  font-size:10px;
  letter-spacing:2px;
  cursor:pointer;
  transition:transform .22s,background .22s,border-color .22s,color .22s;
  font-family:'Orbitron',sans-serif;
  position:relative;
  overflow:hidden;
}

.download-btn:hover{
  background:rgba(255,255,255,0.1);
  border-color:rgba(255,255,255,0.3);
  color:white;
  transform:translateY(-3px);
}

/* MINI WAVE */
.mini-wave{
  display:flex;
  align-items:flex-end;
  gap:3px;
  height:15px;
}

.mini-wave span{
  width:3px;
  background:white;
  border-radius:10px;
  height:5px;
  animation:none;
}

.play-btn.playing .mini-wave span{
  animation:wave 1s infinite ease-in-out;
}

.mini-wave span:nth-child(1){height:5px;}
.mini-wave span:nth-child(2){height:13px;animation-delay:.2s;}
.mini-wave span:nth-child(3){height:8px;animation-delay:.4s;}
.mini-wave span:nth-child(4){height:15px;animation-delay:.6s;}

@keyframes wave{
  0%{transform:scaleY(.4);}
  50%{transform:scaleY(1.6);}
  100%{transform:scaleY(.4);}
}

.empty-state{
  text-align:center;
  padding:60px 20px;
  color:#555;
  grid-column:1/-1;
}

.empty-state-icon{font-size:44px;margin-bottom:14px;opacity:.5;}

/* ===== PLAYER BAR ===== */
#nowPlaying{
  position:fixed;
  left:50%;
  bottom:86px;
  transform:translateX(-50%);
  width:94%;
  max-width:920px;
  background:rgba(8,1,18,0.94);
  border-radius:28px;
  padding:16px 20px;
  display:flex;
  flex-direction:column;
  gap:13px;
  z-index:9999;
  border:1px solid rgba(255,0,255,0.28);
  box-shadow:
    0 24px 70px rgba(0,0,0,0.7),
    0 0 50px rgba(255,0,255,0.1),
    inset 0 1px 0 rgba(255,255,255,0.05);
  backdrop-filter:blur(32px);
  -webkit-backdrop-filter:blur(32px);
  transition:bottom .45s ease,opacity .45s ease;
}

#nowPlaying::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:28px;
  background:linear-gradient(135deg,rgba(255,0,255,0.04),transparent 60%,rgba(138,0,255,0.04));
  pointer-events:none;
}

#nowPlaying.hidden{
  opacity:0;
  pointer-events:none;
  bottom:20px;
}

.player-top{
  display:flex;
  align-items:center;
  gap:14px;
}

.now-art{
  width:54px;height:54px;
  border-radius:14px;
  object-fit:cover;
  border:2px solid rgba(255,0,255,0.4);
  flex-shrink:0;
  box-shadow:0 0 22px rgba(255,0,255,0.28);
  transition:.3s;
}

.player-controls{
  display:flex;
  align-items:center;
  gap:9px;
  flex-shrink:0;
}

#prevBtn,#nextBtn,#shuffleBtn{
  width:38px;height:38px;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:50%;
  background:rgba(255,255,255,0.07);
  color:rgba(255,255,255,0.7);
  cursor:pointer;
  transition:background .22s,border-color .22s,transform .22s,box-shadow .22s,color .22s;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
}

#prevBtn svg,#nextBtn svg,#shuffleBtn svg{
  width:16px;height:16px;
  flex-shrink:0;
}

#prevBtn:hover,#nextBtn:hover,#shuffleBtn:hover{
  background:rgba(255,0,255,0.16);
  border-color:rgba(255,0,255,0.38);
  color:white;
  transform:scale(1.1);
  box-shadow:0 0 14px rgba(255,0,255,0.22);
}

#shuffleBtn.active{
  background:rgba(255,0,255,0.2);
  border-color:rgba(255,0,255,0.55);
  box-shadow:0 0 18px rgba(255,0,255,0.32);
  color:var(--accent);
}

/* Main play/pause button */
#pauseBtn{
  width:58px;height:58px;
  border:none;
  border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
  cursor:pointer;
  box-shadow:0 0 28px rgba(255,0,255,0.6),0 0 56px rgba(255,0,255,0.18),inset 0 1px 0 rgba(255,255,255,0.2);
  transition:transform .18s,box-shadow .18s;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
  position:relative;
  overflow:hidden;
}

#pauseBtn::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:50%;
  background:linear-gradient(135deg,rgba(255,255,255,0.18) 0%,transparent 60%);
  pointer-events:none;
}

#pauseBtn svg{width:22px;height:22px;flex-shrink:0;}

/* Toggle icons via class */
#pauseBtn .icon-pause{display:none;}
#pauseBtn.is-playing .icon-play{display:none;}
#pauseBtn.is-playing .icon-pause{display:block;}

#pauseBtn:hover{
  transform:scale(1.08);
  box-shadow:0 0 40px rgba(255,0,255,0.75),0 0 70px rgba(255,0,255,0.25);
}

#pauseBtn:active{transform:scale(.91);}

.now-info{flex:1;min-width:0;}

#nowTitle{
  font-size:15px;
  font-weight:800;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  letter-spacing:.8px;
  color:#fff;
  text-shadow:0 0 18px rgba(255,0,255,0.55), 0 1px 4px rgba(0,0,0,0.8);
}

#nowSubtitle{display:none;}

/* Visualizer bars in player */
.player-viz{
  display:flex;
  align-items:flex-end;
  gap:3px;
  height:18px;
  margin-top:5px;
}

.player-viz span{
  width:3px;
  border-radius:3px;
  background:linear-gradient(to top,var(--accent),var(--accent3));
  opacity:.3;
  transition:.2s;
}

.player-viz.playing span{
  opacity:1;
  animation:vizBar 1.1s infinite ease-in-out;
}

.player-viz span:nth-child(1){height:6px;animation-delay:.0s;}
.player-viz span:nth-child(2){height:13px;animation-delay:.1s;}
.player-viz span:nth-child(3){height:9px;animation-delay:.22s;}
.player-viz span:nth-child(4){height:18px;animation-delay:.32s;}
.player-viz span:nth-child(5){height:11px;animation-delay:.44s;}
.player-viz span:nth-child(6){height:16px;animation-delay:.55s;}
.player-viz span:nth-child(7){height:8px;animation-delay:.65s;}
.player-viz span:nth-child(8){height:14px;animation-delay:.75s;}

@keyframes vizBar{
  0%,100%{transform:scaleY(.35);}
  50%{transform:scaleY(1);}
}

#loopBtn{
  width:38px;height:38px;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:11px;
  background:rgba(255,255,255,0.07);
  color:rgba(255,255,255,0.65);
  cursor:pointer;
  transition:background .22s,border-color .22s,color .22s,box-shadow .22s;
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
}

#loopBtn svg{width:16px;height:16px;flex-shrink:0;}

#loopBtn:hover{
  background:rgba(255,0,255,0.14);
  border-color:rgba(255,0,255,0.35);
  color:white;
}

#loopBtn.active{
  background:rgba(255,0,255,0.18);
  border-color:rgba(255,0,255,0.45);
  box-shadow:0 0 16px rgba(255,0,255,0.22);
  color:var(--accent);
}

.bars-row{
  display:flex;
  align-items:center;
  gap:12px;
}

#progressBar,#volumeBar{
  -webkit-appearance:none;
  appearance:none;
  width:100%;
  height:5px;
  border-radius:10px;
  /* --pct is updated by JS; filled = magenta→purple, empty = dark */
  background:linear-gradient(to right,
    #ff00ff 0%,
    #8a00ff var(--pct,0%),
    rgba(255,255,255,0.09) var(--pct,0%),

<audio id="bgMusic" src="phonk/bg.mp3" loop preload="auto" autoplay muted playsinline style="display:none"></audio>
<script>
(function(){
  var bg = document.getElementById("bgMusic");
  bg.volume = 0.25;
  var TIME_KEY = "phonkBgTime";
  var MUTED_KEY = "phonkBgMuted";
  /* Clear any stale stopped flag left by older versions */
  localStorage.removeItem("phonkBgStopped");
  var savedTime = parseFloat(localStorage.getItem(TIME_KEY));
  function applySavedTime(){
    if(!isNaN(savedTime) && savedTime > 0 && isFinite(bg.duration) && bg.duration > 0){
      try{ bg.currentTime = savedTime % bg.duration; }catch(e){}
    }
  }
  if(bg.readyState >= 1) applySavedTime();
  else bg.addEventListener("loadedmetadata", applySavedTime, {once:true});
  bg.muted = true;
  bg.play().catch(function(){});
  function unmute(){
    bg.muted = false;
    bg.play().catch(function(){});
    localStorage.setItem(MUTED_KEY, "0");
  }
  if(localStorage.getItem(MUTED_KEY) === "0") unmute();
  /* Auto-unmute when arriving from login — user already gave a gesture */
  if(localStorage.getItem("phonkFromLogin") === "1"){
    localStorage.removeItem("phonkFromLogin");
    setTimeout(function(){ unmute(); }, 120);
  }
  ["click","keydown","touchstart","mousemove","scroll","pointerdown"].forEach(function(evt){
    document.addEventListener(evt, unmute, {once:true, passive:true});
  });
  function persistTime(){
    if(!bg.paused) localStorage.setItem(TIME_KEY, String(bg.currentTime));
  }
  window.addEventListener("beforeunload", persistTime);
  window.addEventListener("pagehide", persistTime);
  setInterval(persistTime, 1000);
})();
</script>

let allSongs = staticSongs.map((s, i) => {
  const override = localStorage.getItem("phonkArtist_" + i);
  return {...s, cloud:false, artist: override !== null ? override : s.artist};
});

let currentIndex = null;
let loopEnabled = false;
let shuffleEnabled = false;
let isProgressDragging = false;
let navVisible = true;
let playMode = "home";
let profilePlaylist = [];

const player = new Audio();
window.__phonkPlayer = player;

const bgMusic = document.getElementById("bgMusic");

/* ===== USER / FAVORITES HELPERS ===== */
function getFavoritesKey(){
  let user = localStorage.getItem("phonkUser") || "guest";
  return "favorites_" + user;
}

/* ===== LOAD CLOUD SONGS ===== */
async function loadCloudSongs(){
  try{
    const snapshot = await getDocs(collection(db,"songs"));
    const cloudSongs = [];
    snapshot.forEach((d)=>{
      const data = d.data();
      cloudSongs.push({
        id:d.id,
        name:data.title || "Untitled Phonk",
        artist:data.creator || data.artist || "",
        file:data.audio,
        image:data.image || "image/logo.jpg",
        cloud:true
      });
    });
    allSongs = [...cloudSongs, ...staticSongs.map((s, i) => {
      const ov = localStorage.getItem("phonkArtist_" + i);
      return {...s, cloud:false, artist: ov !== null ? ov : s.artist};
    })];
  }catch(err){
    console.warn("Could not load cloud phonks:", err);
  }
  createSongs();
  restoreStarStates();
}

/* ===== RENDER SONGS ===== */
function createSongs(){
  const container = document.getElementById("songsContainer");
  if(!container) return;

  if(allSongs.length === 0){
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🎵</div>
        <div>No phonks yet</div>
      </div>
    `;
    return;
  }

  container.innerHTML = allSongs.map((song, index) => `
    <div class="card" data-index="${index}" style="animation-delay:${Math.min(index * 0.045, 0.55)}s">
      <div class="phonk-image">
        <img src="${song.image}" loading="lazy" alt="${song.name}">
        ${song.cloud ? `<span class="cloud-badge">☁ NEW</span>` : ``}
        <button class="star-btn" onclick="toggleStar(event,${index})">★</button>
      </div>
      <div class="content">
        <h2>${song.name}</h2>
        <p class="artist">${song.artist || ""}</p>
        <div class="buttons">
          <button class="play-btn" onclick="playSongByIndex(${index})">
            <span class="play-tri"></span>
            <span class="play-text">PLAY</span>
            <div class="mini-wave"><span></span><span></span><span></span><span></span></div>
          </button>
          <a href="${song.file}" download style="flex:1;">
            <button class="download-btn" style="width:100%;">DOWNLOAD</button>
          </a>
        </div>
      </div>
    </div>
  `).join("");

  restoreStarStates();
  reflectPlayingCard();
}

function reflectPlayingCard(){
  document.querySelectorAll(".card").forEach(card => {
    const idx = Number(card.dataset.index);
    const btn = card.querySelector(".play-btn");
    const isPlaying = idx === currentIndex && !player.paused;
    card.classList.toggle("playing", idx === currentIndex);
    if(btn){
      btn.classList.toggle("playing", isPlaying);
      btn.querySelector(".play-text").innerText = isPlaying ? "PAUSE" : "PLAY";
    }
  });
  document.querySelectorAll(".beast-play[data-song-index]").forEach(btn => {
    const idx = Number(btn.dataset.songIndex);
    const isPlaying = idx === currentIndex && !player.paused;
    btn.classList.toggle("playing", isPlaying);
    btn.querySelector(".play-text").innerText = isPlaying ? "PAUSE" : "PLAY";
  });

  /* Visualizer */
  const viz = document.getElementById("playerViz");
  if(viz) viz.classList.toggle("playing", currentIndex !== null && !player.paused);
}

/* ===== SLIDER FILL ===== */
function setSliderFill(el){
  const min = parseFloat(el.min) || 0;
  const max = parseFloat(el.max) || 100;
  const pct = ((parseFloat(el.value) - min) / (max - min)) * 100;
  el.style.setProperty("--pct", pct.toFixed(2) + "%");
}

/* ===== PLAYBACK ===== */
function formatTime(t){
  if(!isFinite(t) || t < 0) return "0:00";
  const m = Math.floor(t / 60);
  const s = Math.floor(t % 60).toString().padStart(2,"0");
  return `${m}:${s}`;
}

/* Shuffle helper: pick a random index different from current */
function randomNext(){
  if(allSongs.length <= 1) return 0;
  let idx;
  do { idx = Math.floor(Math.random() * allSongs.length); } while(idx === currentIndex);
  return idx;
}

window.playSongByIndex = function(index){
  const song = allSongs[index];
  if(!song) return;
  playMode = "home";

  if(!bgMusic.paused) bgMusic.pause();

  if(currentIndex === index){ togglePause(); return; }

  currentIndex = index;
  player.src = song.file;
  player.loop = loopEnabled;
  player.volume = Number(document.getElementById("volumeBar").value);
  player.play().catch(()=>{});

  document.getElementById("nowTitle").innerText = song.name;
  document.getElementById("nowArt").src = song.image;
  document.getElementById("pauseBtn").classList.add("is-playing");
  document.getElementById("nowPlaying").classList.remove("hidden");
  document.getElementById("navToggle").classList.add("visible");

  reflectPlayingCard();
};

window.playNext = function(){
  if(playMode === "profile"){
    if(profilePlaylist.length === 0) return;
    const pos = profilePlaylist.indexOf(currentIndex);
    const nextPos = shuffleEnabled
      ? Math.floor(Math.random() * profilePlaylist.length)
      : (pos === -1 ? 0 : pos + 1) % profilePlaylist.length;
    _playInProfile(profilePlaylist[nextPos]);
  } else {
    if(allSongs.length === 0) return;
    const nextIndex = shuffleEnabled
      ? randomNext()
      : (currentIndex === null ? 0 : (currentIndex + 1) % allSongs.length);
    playSongByIndex(nextIndex);
  }
};

window.playPrevious = function(){
  if(playMode === "profile"){
    if(profilePlaylist.length === 0) return;
    const pos = profilePlaylist.indexOf(currentIndex);
    const prevPos = (pos <= 0 ? profilePlaylist.length : pos) - 1;
    _playInProfile(profilePlaylist[prevPos]);
  } else {
    if(allSongs.length === 0) return;
    const prevIndex = currentIndex === null ? allSongs.length - 1 : (currentIndex - 1 + allSongs.length) % allSongs.length;
    playSongByIndex(prevIndex);
  }
};

window.togglePause = function(){
  if(currentIndex === null) return;
  if(player.paused){
    player.play().catch(()=>{});
    document.getElementById("pauseBtn").classList.add("is-playing");
  } else {
    player.pause();
    document.getElementById("pauseBtn").classList.remove("is-playing");
  }
  reflectPlayingCard();
};

window.toggleLoop = function(){
  loopEnabled = !loopEnabled;
  player.loop = loopEnabled;
  document.getElementById("loopBtn").classList.toggle("active", loopEnabled);
};

window.toggleShuffle = function(){
  shuffleEnabled = !shuffleEnabled;
  document.getElementById("shuffleBtn").classList.toggle("active", shuffleEnabled);
};

player.addEventListener("play", () => {
  reflectPlayingCard();
  /* Silence bg music while a phonk track is playing */
  if(!bgMusic.paused) bgMusic.pause();
});
player.addEventListener("pause", () => {
  reflectPlayingCard();
  /* Resume bg music when user pauses the phonk player */
});
player.addEventListener("ended", () => { if(!loopEnabled) playNext(); });

player.addEventListener("timeupdate", () => {
  if(isProgressDragging) return;
  const progress = (player.currentTime / player.duration) * 100 || 0;
  const pb = document.getElementById("progressBar");
  pb.value = progress;
  setSliderFill(pb);
  document.getElementById("curTime").innerText = formatTime(player.currentTime);
  document.getElementById("durTime").innerText = formatTime(player.duration);
});

document.getElementById("progressBar").addEventListener("mousedown", () => isProgressDragging = true);
document.getElementById("progressBar").addEventListener("touchstart", () => isProgressDragging = true);
document.getElementById("progressBar").addEventListener("mouseup", () => isProgressDragging = false);
document.getElementById("progressBar").addEventListener("touchend", () => isProgressDragging = false);

document.getElementById("progressBar").addEventListener("input", function(){
  if(currentIndex !== null && isFinite(player.duration))
    player.currentTime = (this.value / 100) * player.duration;
  setSliderFill(this);
});

document.getElementById("volumeBar").addEventListener("input", function(){
  player.volume = Number(this.value);
  setSliderFill(this);
});

/* Initialise fills on page load */
setSliderFill(document.getElementById("progressBar"));
setSliderFill(document.getElementById("volumeBar"));

/* ===== SEARCH ===== */
window.searchSongs = function(){
  const value = document.getElementById("searchInput").value.toLowerCase();
  document.querySelectorAll(".card").forEach(card => {
    const title = card.querySelector("h2").innerText.toLowerCase();
    card.style.display = title.includes(value) ? "" : "none";
  });
};

/* ===== FAVORITES / STAR ===== */
window.toggleStar = function(event, index){
  event.stopPropagation();
  event.preventDefault();
  const btn = event.currentTarget || event.target;
  const favKey = getFavoritesKey();
  let favorites = JSON.parse(localStorage.getItem(favKey)) || [];

  if(favorites.includes(index)){
    favorites = favorites.filter(fav => fav !== index);
    btn.classList.remove("active");
  } else {
    favorites.push(index);
    btn.classList.add("active");
  }
  localStorage.setItem(favKey, JSON.stringify(favorites));
  if(document.getElementById("view-profile").classList.contains("active")) loadFavorites();
};

function restoreStarStates(){
  const favKey = getFavoritesKey();
  const favorites = JSON.parse(localStorage.getItem(favKey)) || [];
  document.querySelectorAll(".star-btn").forEach((btn) => {
    const index = Number(btn.closest(".card").dataset.index);
    btn.classList.toggle("active", favorites.includes(index));
  });
}

/* ===== PROFILE VIEW ===== */
function renderProfile(){
  const user = localStorage.getItem("phonkUser");
  document.getElementById("username").innerText = user || "Guest User";
  loadFavorites();
}

function loadFavorites(){
  const favKey = getFavoritesKey();
  const favorites = JSON.parse(localStorage.getItem(favKey)) || [];
  const beastBox = document.getElementById("beastBox");

  if(favorites.length === 0){
    beastBox.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🎵</div>
        <div>No favorite phonks yet. Star your favorites from Home!</div>
      </div>
    `;
    return;
  }

  beastBox.innerHTML = favorites.map((index) => {
    const song = allSongs[index];
    if(!song) return "";
    return `
      <div class="msg">
        <img src="${song.image}" class="beast-img" alt="${song.name}">
        <div class="beast-info">
          <b>${song.name}</b>
          <span>${song.artist || ""}</span>
        </div>
        <button class="beast-play play-btn" data-song-index="${index}" onclick="playFromProfile(${index})">
          <span class="play-tri"></span>
          <span class="play-text">PLAY</span>
          <div class="mini-wave"><span></span><span></span><span></span><span></span></div>
        </button>
        <button class="beast-unstar" onclick="removeFavorite(${index})">★</button>
      </div>
    `;
  }).join("");
}

function _playInProfile(songIndex){
  const song = allSongs[songIndex];
  if(!song) return;
  if(!bgMusic.paused) bgMusic.pause();
  if(currentIndex === songIndex){ togglePause(); return; }
  currentIndex = songIndex;
  player.src = song.file;
  player.loop = loopEnabled;
  player.volume = Number(document.getElementById("volumeBar").value);
  player.play().catch(()=>{});
  document.getElementById("nowTitle").innerText = song.name;
  document.getElementById("nowArt").src = song.image;
  document.getElementById("pauseBtn").classList.add("is-playing");
  document.getElementById("nowPlaying").classList.remove("hidden");
  document.getElementById("navToggle").classList.add("visible");
  reflectPlayingCard();
}

window.playFromProfile = function(songIndex){
  const favKey = getFavoritesKey();
  profilePlaylist = JSON.parse(localStorage.getItem(favKey)) || [];
  _playInProfile(songIndex);
  playMode = "profile";
};

window.removeFavorite = function(index){
  const favKey = getFavoritesKey();
  let favorites = JSON.parse(localStorage.getItem(favKey)) || [];
  favorites = favorites.filter(fav => fav !== index);
  localStorage.setItem(favKey, JSON.stringify(favorites));
  loadFavorites();
  restoreStarStates();
};

window.uploadPhonk = async function(){
  await ensureAuth();
  const title = document.getElementById("songTitle").value.trim();
  const imageFile = document.getElementById("songImage").files[0];
  const audioFile = document.getElementById("songAudio").files[0];
  if(!title || !imageFile || !audioFile){ alert("Fill all fields"); return; }

  const uploadBtn = document.getElementById("uploadBtn");
  const progressWrap = document.getElementById("uploadProgress");
  const progressFill = document.getElementById("uploadProgressFill");

  uploadBtn.disabled = true;
  uploadBtn.innerText = "UPLOADING...";
  progressWrap.classList.add("show");
  progressFill.style.width = "0%";

  try{
    const imageRef = ref(storage, "images/" + Date.now() + "_" + imageFile.name);
    await uploadResumable(imageRef, imageFile, (pct) => progressFill.style.width = (pct * 0.5) + "%");
    const imageURL = await getDownloadURL(imageRef);

    const audioRef = ref(storage, "songs/" + Date.now() + "_" + audioFile.name);
    await uploadResumable(audioRef, audioFile, (pct) => progressFill.style.width = (50 + pct * 0.5) + "%");
    const audioURL = await getDownloadURL(audioRef);

    const creator = document.getElementById("songCreator").value.trim();
    await addDoc(collection(db,"songs"), {
      title, creator, image:imageURL, audio:audioURL, createdAt:Date.now()
    });

    progressFill.style.width = "100%";
    alert("Phonk Uploaded Successfully");

    document.getElementById("songTitle").value = "";
    document.getElementById("songCreator").value = "";
    document.getElementById("songImage").value = "";
    document.getElementById("songAudio").value = "";

    await loadCloudSongs();
  }catch(err){
    console.error(err);
    alert("Upload Failed: " + (err && err.message ? err.message : err));
  }finally{
    uploadBtn.disabled = false;
    uploadBtn.innerText = "UPLOAD PHONK";
    setTimeout(() => {
      progressWrap.classList.remove("show");
      progressFill.style.width = "0%";
    }, 800);
  }
};

function uploadResumable(storageRef, file, onProgress){
  return new Promise((resolve, reject) => {
    const task = uploadBytesResumable(storageRef, file);
    task.on("state_changed",
      (snap) => { const pct = snap.totalBytes ? (snap.bytesTransferred / snap.totalBytes) : 0; if(onProgress) onProgress(pct * 100); },
      (err) => reject(err),
      () => resolve()
    );
  });
}

/* ===== CHAT VIEW ===== */
let currentUser = localStorage.getItem("phonkUser") || localStorage.getItem("username") || "Unknown";
const isAdmin = currentUser === "ADMIN";
let postsLoaded = false;

window.sendMessage = async function(){
  await ensureAuth();
  const input = document.getElementById("messageInput");
  const text = input.value.trim();
  if(text === "") return;

  let finalUsername = currentUser;
  if(finalUsername === "Unknown" || !finalUsername)
    finalUsername = localStorage.getItem("phonkUser") || "Unknown";

  try{
    await addDoc(collection(db,"comments"), { username:finalUsername, text, time:Date.now() });
    input.value = "";
    loadMessages();
  }catch(err){
    console.error(err);
    alert("Could not send message: " + err.message);
  }
};

async function loadMessages(){
  await ensureAuth();
  const container = document.getElementById("messages");
  container.innerHTML = `<p style="text-align:center;color:#555;font-size:11px;padding:24px;">Loading...</p>`;
  try{
    const q = query(collection(db,"comments"), orderBy("time","asc"));
    const snapshot = await getDocs(q);
    container.innerHTML = "";
    snapshot.forEach((d) => {
      const data = d.data();
      const side = data.username === "ADMIN" ? "right" : "left";
      container.innerHTML += `
        <div class="message-row ${side}">
          <div class="message" data-id="${d.id}">
            <input type="checkbox" class="selectBox" value="${d.id}">
            <div class="username">@${data.username}</div>
            <div>${data.text}</div>
          </div>
        </div>
      `;
    });
    if(container.innerHTML === ""){
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">💬</div>
          <div>No messages yet. Say something!</div>
        </div>
      `;
    }
    if(isAdmin) enableLongPress();
  }catch(err){
    console.error(err);
    container.innerHTML = `<p style="color:#ff8080;text-align:center;font-size:11px;">Could not load messages: ${err.message}</p>`;
  }
}

function enableLongPress(){
  const messages = document.querySelectorAll(".message");
  messages.forEach(msg => {
    let timer;
    msg.addEventListener("touchstart", () => { timer = setTimeout(() => showSelect(msg), 700); });
    msg.addEventListener("touchend", () => clearTimeout(timer));
    msg.addEventListener("contextmenu", function(e){ e.preventDefault(); showSelect(msg); });
  });
}

function showSelect(msg){
  msg.querySelector(".selectBox").style.display = "block";
  document.getElementById("deleteBtn").style.display = "block";
}

if(isAdmin){
  document.getElementById("deleteBtn").addEventListener("click", async () => {
    await ensureAuth();
    const selected = document.querySelectorAll(".selectBox:checked");
    for(const s of selected) await deleteDoc(doc(db,"comments",s.value));
    loadMessages();
  });
}

document.getElementById("messageInput").addEventListener("keypress", function(e){
  if(e.key === "Enter") sendMessage();
});

window.toggleNavbar = function(){
  const toggle = document.getElementById("navToggle");
  const playerBar = document.getElementById("nowPlaying");
  navVisible = !navVisible;
  if(!navVisible){
    toggle.classList.add("active");
    toggle.classList.add("player-hidden");   // drop button near nav bar
    playerBar.classList.add("hidden");
  } else {
    toggle.classList.remove("active");
    toggle.classList.remove("player-hidden"); // restore position above player
    if(currentIndex !== null) playerBar.classList.remove("hidden");
  }
};

new MutationObserver(() => {
  const playerBar = document.getElementById("nowPlaying");
  const toggle = document.getElementById("navToggle");

}).observe(document.getElementById("nowPlaying"), { attributes:true, attributeFilter:["class"] });

/* ===== VIEW ROUTER ===== */
const viewLabels = { home:"HOME", host:"HOST PANEL", post:"PHONK CHAT", profile:"PROFILE" };

window.switchView = function(name){
  if(!document.getElementById("view-" + name)) name = "home";
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  document.getElementById("view-" + name).classList.add("active");
  document.querySelectorAll(".nav-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.view === name);
  });
  document.getElementById("viewTitle").innerText = viewLabels[name] || "";
  document.getElementById("searchBoxWrap").style.display = name === "home" ? "" : "none";

  if(name !== "host"){
    document.getElementById("addPanel").classList.remove("show");
    document.getElementById("userPanel").classList.remove("show");
  }
  if(name === "post" && !postsLoaded){ postsLoaded = true; loadMessages(); }
  if(name === "post") loadMessages();
  if(name === "profile") renderProfile();
  if(history.replaceState) history.replaceState(null, "", "#" + name);
};

window.addEventListener("hashchange", () => {
  const name = location.hash.replace("#","") || "home";
  switchView(name);
});
